name: Build and Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # 构建 Windows 版本
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Build Windows portable executable
        run: cargo build --release --manifest-path=src-tauri/Cargo.toml

      - name: Get version
        id: get_version
        run: |
          if (Test-Path "VERSION") {
            $VERSION = Get-Content VERSION
            echo "VERSION=$VERSION" >> $env:GITHUB_OUTPUT
          } else {
            echo "VERSION=1.0.0" >> $env:GITHUB_OUTPUT
          }

      - name: List built files
        run: Get-ChildItem -Path src-tauri\target\release\ -Recurse -Include "*.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: src-tauri/target/release/*.exe

  # 构建 macOS 版本
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Build macOS app bundle
        run: npm run build

      - name: Get version
        id: get_version
        run: |
          if [ -f "VERSION" ]; then
            VERSION=$(cat VERSION)
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "VERSION=1.0.0" >> $GITHUB_OUTPUT
          fi

      - name: List built files
        run: ls -R src-tauri/target/release/bundle/

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg

  # 创建 Release
  release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: ls -R artifacts/

      - name: Get version
        id: get_version
        run: |
          if [ -f "VERSION" ]; then
            VERSION=$(cat VERSION)
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "VERSION=1.0.0" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: "课表管理系统 v${{ steps.get_version.outputs.VERSION }}"
          files: |
            artifacts/windows-exe/*
            artifacts/macos-dmg/*
          generate_release_notes: true
          body: |
            ## 课表管理系统 v${{ steps.get_version.outputs.VERSION }}

            ### 下载

            - **Windows**: 下载 `课表管理系统.exe` （便携式，双击运行无需安装）
            - **macOS**: 下载 `.dmg` 文件（拖拽安装）

            ### 使用说明

            - Windows: 直接双击 exe 文件运行，无需安装
            - macOS: 打开 DMG 文件，将应用拖拽到应用程序文件夹
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
